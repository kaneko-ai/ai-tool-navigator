name: Weekly Summary

on:
  schedule:
    # 毎週月曜 9:00 JST = 日曜 0:00 UTC
    - cron: '0 0 * * 1'
  workflow_dispatch:  # 手動実行も可能

permissions:
  contents: read
  issues: write

jobs:
  summary:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # git log を全期間で読むため

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Generate weekly summary
        id: gen
        run: |
          python3 scripts/weekly_summary.py --output /tmp/summary.md
          echo "summary_path=/tmp/summary.md" >> $GITHUB_OUTPUT
          # タイトル用の日付範囲を計算
          TODAY=$(TZ=Asia/Tokyo date +%Y-%m-%d)
          SINCE=$(TZ=Asia/Tokyo date -d "7 days ago" +%Y-%m-%d 2>/dev/null || TZ=Asia/Tokyo date -v-7d +%Y-%m-%d)
          echo "issue_title=📊 週次サマリ ${SINCE} 〜 ${TODAY}" >> $GITHUB_OUTPUT

      - name: Show summary in Actions log
        run: |
          echo "::group::Weekly Summary"
          cat /tmp/summary.md
          echo "::endgroup::"
          # GitHub Actions の Summary タブにも表示
          cat /tmp/summary.md >> $GITHUB_STEP_SUMMARY

      - name: Create or update issue
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const body = fs.readFileSync('/tmp/summary.md', 'utf8');
            const title = `${{ steps.gen.outputs.issue_title }}`;

            // 同タイトルの既存Issue検索（同日に複数回手動実行された場合の重複防止）
            const existing = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'weekly-summary'
            });
            const sameTitleIssue = existing.data.find(i => i.title === title);

            if (sameTitleIssue) {
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: sameTitleIssue.number,
                body: body
              });
              console.log(`✅ Updated existing issue #${sameTitleIssue.number}`);
            } else {
              const result = await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: title,
                body: body,
                labels: ['weekly-summary', 'auto-generated']
              });
              console.log(`✅ Created issue #${result.data.number}`);
            }
