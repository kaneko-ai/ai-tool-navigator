name: Daily Article Generation

on:
  schedule:
    # 毎日 10:00 UTC = 19:00 JST
    - cron: '0 10 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate-article:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install GitHub Copilot CLI
        env:
          GH_TOKEN: ${{ secrets.COPILOT_PAT }}
        run: |
          npm install -g @github/copilot
          copilot --version

      - name: Resolve today's topic
        id: topic
        run: |
          DRAFT_DATE_BASE=$(TZ=Asia/Tokyo date +%Y-%m-%d)
          DRAFT_DATE="$DRAFT_DATE_BASE"
          SUFFIX=2
          while [ -d "drafts/$DRAFT_DATE" ]; do
            DRAFT_DATE="${DRAFT_DATE_BASE}-${SUFFIX}"
            SUFFIX=$((SUFFIX+1))
          done
          echo "draft_date=$DRAFT_DATE" >> $GITHUB_OUTPUT
          mkdir -p drafts/$DRAFT_DATE
          echo "Draft date: $DRAFT_DATE (base: $DRAFT_DATE_BASE)"


      - name: Build recent topics context
        run: |
          chmod +x scripts/build_topic_context.sh
          ./scripts/build_topic_context.sh /tmp/recent_topics.txt 30
          echo "::group::Recent topics context"
          cat /tmp/recent_topics.txt
          echo "::endgroup::"
          
      - name: Stage 1 - Topic expansion
        id: stage1
        env:
          GH_TOKEN: ${{ secrets.COPILOT_PAT }}
        run: |
          DRAFT_DATE="${{ steps.topic.outputs.draft_date }}"

          # プロンプト本体 + 直近トピックリストを結合（重複防止コンテキスト注入）
          {
            cat prompts/01_topic_select.md
            echo ""
            echo "==="
            echo ""
            cat /tmp/recent_topics.txt
          } > /tmp/stage1_prompt.txt

          copilot -p "$(cat /tmp/stage1_prompt.txt)" \
            --model auto \
            --allow-all-tools \
            --output-format json \
            > /tmp/stage1.jsonl 2> /tmp/stage1.stderr || true


          # 本文抽出
          jq -r 'select(.type=="assistant.message") | .data.content' /tmp/stage1.jsonl \
            > drafts/$DRAFT_DATE/01_topic.md

          # モデル名と統計抽出
          MODEL=$(jq -r 'select(.type=="assistant.message") | .data.model' /tmp/stage1.jsonl | head -1)
          PREMIUM=$(jq -r 'select(.type=="result") | .usage.premiumRequests' /tmp/stage1.jsonl | head -1)
          DURATION=$(jq -r 'select(.type=="result") | .usage.sessionDurationMs' /tmp/stage1.jsonl | head -1)
          echo "model=${MODEL:-unknown}" >> $GITHUB_OUTPUT
          echo "premium=${PREMIUM:-0}" >> $GITHUB_OUTPUT
          echo "duration=${DURATION:-0}" >> $GITHUB_OUTPUT
          echo "::notice title=Stage 1 (Topic)::model=$MODEL premium=$PREMIUM duration=${DURATION}ms"

      - name: Stage 2 - Draft article
        id: stage2
        env:
          GH_TOKEN: ${{ secrets.COPILOT_PAT }}
        run: |
          DRAFT_DATE="${{ steps.topic.outputs.draft_date }}"
          {
            cat prompts/02_draft.md
            echo ""
            echo "==="
            echo "前段（テーマ選定）の出力:"
            cat drafts/$DRAFT_DATE/01_topic.md
          } > /tmp/stage2_prompt.txt

          copilot -p "$(cat /tmp/stage2_prompt.txt)" \
            --model auto \
            --allow-all-tools \
            --output-format json \
            > /tmp/stage2.jsonl 2> /tmp/stage2.stderr || true

          jq -r 'select(.type=="assistant.message") | .data.content' /tmp/stage2.jsonl \
            > drafts/$DRAFT_DATE/02_draft.md

          MODEL=$(jq -r 'select(.type=="assistant.message") | .data.model' /tmp/stage2.jsonl | head -1)
          PREMIUM=$(jq -r 'select(.type=="result") | .usage.premiumRequests' /tmp/stage2.jsonl | head -1)
          DURATION=$(jq -r 'select(.type=="result") | .usage.sessionDurationMs' /tmp/stage2.jsonl | head -1)
          echo "model=${MODEL:-unknown}" >> $GITHUB_OUTPUT
          echo "premium=${PREMIUM:-0}" >> $GITHUB_OUTPUT
          echo "duration=${DURATION:-0}" >> $GITHUB_OUTPUT
          echo "::notice title=Stage 2 (Draft)::model=$MODEL premium=$PREMIUM duration=${DURATION}ms"


      - name: Stage 3 - Fact check
        id: stage3
        env:
          GH_TOKEN: ${{ secrets.COPILOT_PAT }}
        run: |
          DRAFT_DATE="${{ steps.topic.outputs.draft_date }}"
          {
            cat prompts/03_factcheck.md
            echo ""
            echo "==="
            echo "チェック対象の下書き:"
            cat drafts/$DRAFT_DATE/02_draft.md
          } > /tmp/stage3_prompt.txt

          copilot -p "$(cat /tmp/stage3_prompt.txt)" \
            --model auto \
            --allow-all-tools \
            --output-format json \
            > /tmp/stage3.jsonl 2> /tmp/stage3.stderr || true

          jq -r 'select(.type=="assistant.message") | .data.content' /tmp/stage3.jsonl \
            > drafts/$DRAFT_DATE/03_factcheck.md

          MODEL=$(jq -r 'select(.type=="assistant.message") | .data.model' /tmp/stage3.jsonl | head -1)
          PREMIUM=$(jq -r 'select(.type=="result") | .usage.premiumRequests' /tmp/stage3.jsonl | head -1)
          DURATION=$(jq -r 'select(.type=="result") | .usage.sessionDurationMs' /tmp/stage3.jsonl | head -1)
          echo "model=${MODEL:-unknown}" >> $GITHUB_OUTPUT
          echo "premium=${PREMIUM:-0}" >> $GITHUB_OUTPUT
          echo "duration=${DURATION:-0}" >> $GITHUB_OUTPUT
          echo "::notice title=Stage 3 (Factcheck)::model=$MODEL premium=$PREMIUM duration=${DURATION}ms"

      - name: Stage 4 - Final polish
        id: stage4
        env:
          GH_TOKEN: ${{ secrets.COPILOT_PAT }}
        run: |
          DRAFT_DATE="${{ steps.topic.outputs.draft_date }}"
          {
            cat prompts/04_polish.md
            echo ""
            echo "==="
            echo "ファクトチェック結果:"
            cat drafts/$DRAFT_DATE/03_factcheck.md
            echo ""
            echo "==="
            echo "元の下書き:"
            cat drafts/$DRAFT_DATE/02_draft.md
            echo ""
            echo "公開日: $DRAFT_DATE"
          } > /tmp/stage4_prompt.txt

          copilot -p "$(cat /tmp/stage4_prompt.txt)" \
            --model auto \
            --allow-all-tools \
            --output-format json \
            > /tmp/stage4.jsonl 2> /tmp/stage4.stderr || true

          jq -r 'select(.type=="assistant.message") | .data.content' /tmp/stage4.jsonl \
            > drafts/$DRAFT_DATE/04_final.md

          MODEL=$(jq -r 'select(.type=="assistant.message") | .data.model' /tmp/stage4.jsonl | head -1)
          PREMIUM=$(jq -r 'select(.type=="result") | .usage.premiumRequests' /tmp/stage4.jsonl | head -1)
          DURATION=$(jq -r 'select(.type=="result") | .usage.sessionDurationMs' /tmp/stage4.jsonl | head -1)
          echo "model=${MODEL:-unknown}" >> $GITHUB_OUTPUT
          echo "premium=${PREMIUM:-0}" >> $GITHUB_OUTPUT
          echo "duration=${DURATION:-0}" >> $GITHUB_OUTPUT
          echo "::notice title=Stage 4 (Polish)::model=$MODEL premium=$PREMIUM duration=${DURATION}ms"


      - name: Quality gate
        id: gate
        run: |
          DRAFT_DATE="${{ steps.topic.outputs.draft_date }}"
          FINAL="drafts/$DRAFT_DATE/04_final.md"
          FAIL=0

          if [ ! -s "$FINAL" ]; then
            echo "::error::final 04_final.md が空または存在しません"
            FAIL=1
          fi

          # front-matter 先頭性チェック（独白リーク防止）
          FIRST_NONEMPTY_LINE=$(grep -m1 -nE '\S' "$FINAL" | head -1 | cut -d: -f1)
          FIRST_CONTENT=$(sed -n "${FIRST_NONEMPTY_LINE}p" "$FINAL")
          if [ "$FIRST_CONTENT" != "---" ]; then
            echo "::error::front-matter が先頭にありません（独白リーク疑い）。最初の非空行: '$FIRST_CONTENT'"
            FAIL=1
          fi

          # 文字数（マルチバイト対応: wc -m）
          CHARS=$(wc -m < "$FINAL" | tr -d ' ')
          echo "character_count=$CHARS" >> $GITHUB_OUTPUT
          echo "Character count: $CHARS"
          if [ "$CHARS" -lt 2500 ] || [ "$CHARS" -gt 3500 ]; then
            echo "::warning::文字数 $CHARS が 2500-3500 の範囲外"
          fi

          # 末尾文字チェック
          LAST=$(tail -c 4 "$FINAL" | tr -d '\n' | tail -c 1)
          if [ "$LAST" != "。" ] && [ "$LAST" != ".！" ] && [ "$LAST" != "！" ] && [ "$LAST" != "？" ]; then
            echo "::warning::末尾切れ疑い: last char = $LAST"
          fi

          # frontmatter 必須キー
          for key in title description date ai_assisted editor_reviewed; do
            if ! grep -q "^${key}:" "$FINAL"; then
              echo "::warning::frontmatter キー欠落: $key"
            fi
          done

          # editor_reviewed は必ず false で生成
          if grep -E "^editor_reviewed:[[:space:]]*true" "$FINAL" >/dev/null; then
            echo "::error::editor_reviewed: true で生成されています (polish 暴走)"
            FAIL=1
          fi

          echo "QUALITY_GATE_FAIL=$FAIL" >> $GITHUB_ENV

          if [ $FAIL -eq 1 ]; then
            echo "::warning::Quality gate に warning あり。drafts/ には保存されるが src/articles/ への移送は人手判断。"
          else
            echo "Quality gate OK"
          fi

      - name: Model usage summary
        if: always()
        run: |
          DRAFT_DATE="${{ steps.topic.outputs.draft_date }}"
          {
            echo "## 🤖 Model Usage Summary"
            echo ""
            echo "**Draft date:** $DRAFT_DATE"
            echo "**Character count:** ${{ steps.gate.outputs.character_count }}"
            echo ""
            echo "| Stage | Model | Premium Requests | Duration |"
            echo "|---|---|---|---|"
            echo "| 1. Topic expansion | \`${{ steps.stage1.outputs.model }}\` | ${{ steps.stage1.outputs.premium }} | ${{ steps.stage1.outputs.duration }}ms |"
            echo "| 2. Draft article | \`${{ steps.stage2.outputs.model }}\` | ${{ steps.stage2.outputs.premium }} | ${{ steps.stage2.outputs.duration }}ms |"
            echo "| 3. Fact check | \`${{ steps.stage3.outputs.model }}\` | ${{ steps.stage3.outputs.premium }} | ${{ steps.stage3.outputs.duration }}ms |"
            echo "| 4. Final polish | \`${{ steps.stage4.outputs.model }}\` | ${{ steps.stage4.outputs.premium }} | ${{ steps.stage4.outputs.duration }}ms |"
            echo ""
            echo "**Final article:** [\`drafts/$DRAFT_DATE/04_final.md\`](../blob/main/drafts/$DRAFT_DATE/04_final.md)"
          } >> $GITHUB_STEP_SUMMARY

      - name: Commit drafts (always)
        if: always()
        run: |
          git config user.name "ai-tool-navigator-bot"
          git config user.email "ai-tool-navigator-bot@users.noreply.github.com"
          git add drafts/
          git diff --staged --quiet || git commit -m "Daily draft: ${{ steps.topic.outputs.draft_date }} (gate_fail=${QUALITY_GATE_FAIL:-0}, models=s1:${{ steps.stage1.outputs.model }}/s2:${{ steps.stage2.outputs.model }}/s3:${{ steps.stage3.outputs.model }}/s4:${{ steps.stage4.outputs.model }})"
          # push 競合対策: リモートの最新を取り込んでから push
          for i in 1 2 3; do
            git pull --rebase origin main && git push origin main && break
            echo "push retry $i"
            sleep 5
          done
